version: 0.0
os: linux

files:
  - source:  /
    destination: /home/ubuntu/dev/action
    overwrite: yes
file_exists_behavior: OVERWRITE

permissions:
  - object: /home/ubuntu/dev/action
    owner: ubuntu
    group: ubuntu

hooks:
  AfterInstall:
    - location: scripts/deploy.sh
      timeout: 60
      runas : root

